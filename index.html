<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>羽球報名系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            app: { bg: '#F8FAFC', surface: '#FFFFFF', primary: '#0F172A', text: '#64748B', accent: '#0D9488', accent_hover: '#0F766E', alert: '#F43F5E' }
          }
        }
      }
    }
  </script>
  <style>
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-app-bg font-sans text-app-primary min-h-screen pb-24 relative">

  <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-100 px-5 py-4 flex justify-center items-center">
    <h1 class="text-lg font-extrabold tracking-wide">🏸 週末羽球俱樂部</h1>
  </header>

  <main class="max-w-md mx-auto mt-4 px-4 space-y-4">

    <div class="bg-app-primary rounded-3xl p-6 text-white shadow-lg shadow-slate-200/50 relative overflow-hidden min-h-[160px]">
      <div class="absolute -right-6 -top-6 w-24 h-24 rounded-full border-4 border-white/10"></div>
      
      <div class="text-app-accent font-bold text-sm tracking-widest mb-1">NEXT GAME</div>
      <h2 id="eventDate" class="text-3xl font-black mb-1">載入中...</h2>
      <p id="eventTime" class="text-slate-300 font-medium text-lg flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        --:--
      </p>
      <div class="mt-5 flex items-center gap-3">
        <span id="statusBadge" class="bg-slate-700 text-white px-3 py-1 rounded-full text-xs font-bold transition-colors">讀取狀態...</span>
        <span id="deadlineText" class="text-slate-400 text-xs">截止: --/-- --:--</span>
      </div>
    </div>

    <div class="pt-2 pb-1">
      <h3 class="text-slate-500 font-bold text-sm tracking-wider px-1">選擇報名場次</h3>
    </div>

    <div class="bg-app-surface rounded-2xl p-5 shadow-sm border border-slate-100">
      <div class="flex justify-between items-center mb-3">
        <h4 class="text-xl font-bold">一般散打</h4>
        <span class="bg-teal-50 text-app-accent px-2 py-1 rounded-lg text-xs font-bold">剩餘 4 位</span>
      </div>
      <div class="flex justify-between items-end">
        <div><span class="text-2xl font-extrabold">NT$ 0</span><span class="text-app-text text-sm ml-1">/ 人</span></div>
        <div class="text-app-text text-sm font-medium">目前 2 / 6 人</div>
      </div>
      <button id="btnNormal" onclick="openBottomSheet('一般散打')" class="signup-btn w-full mt-4 bg-app-accent text-white font-bold py-3.5 rounded-xl shadow-md active:bg-app-accent_hover transition-all">
        立即報名
      </button>
    </div>

  </main>

  <div id="backdrop" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 opacity-0 pointer-events-none transition-opacity duration-300" onclick="closeBottomSheet()"></div>

  <div id="bottomSheet" class="fixed inset-x-0 bottom-0 z-50 transform translate-y-full transition-transform duration-300 ease-out max-w-md mx-auto">
    <div class="bg-white rounded-t-3xl p-6 shadow-2xl pb-10">
      <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
      <h3 class="text-2xl font-black text-app-primary mb-1">確認報名資料</h3>
      <p id="selectedType" class="text-app-accent font-bold mb-6 text-sm">已選擇：</p>
      
      <form id="regForm" class="space-y-4">
        <input type="hidden" id="type">
        <div><label class="block text-xs font-bold text-app-text mb-1 uppercase tracking-wider">姓名 Name</label><input type="text" id="name" required class="w-full bg-slate-50 border-none rounded-xl p-4 text-app-primary font-medium outline-none"></div>
        <div><label class="block text-xs font-bold text-app-text mb-1 uppercase tracking-wider">電話 Phone</label><input type="tel" id="phone" required class="w-full bg-slate-50 border-none rounded-xl p-4 text-app-primary font-medium outline-none"></div>
        <div><label class="block text-xs font-bold text-app-text mb-1 uppercase tracking-wider">備註 Note</label><input type="text" id="note" class="w-full bg-slate-50 border-none rounded-xl p-4 text-app-primary outline-none"></div>
        <div class="pt-4"><button type="submit" id="submitBtn" class="w-full bg-app-primary text-white font-bold text-lg py-4 rounded-xl shadow-lg active:scale-[0.98] transition-all">確認送出</button></div>
      </form>
    </div>
  </div>

  <script>
    // 【重要】填入你的 GAS 網址 (與之前相同)
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz4cf5tRVhNxooTtxzVQAXtJZv4m8MRo58DVcS_s6xXaC6pOki-2TMs1ybYSGT8KqRn/exec'; 
    
    // 初始化：網頁載入時去 GAS 抓取活動設定
    function loadEventData() {
      fetch(scriptURL)
        .then(response => response.json())
        .then(data => {
          // 替換畫面上的文字
          document.getElementById('eventDate').innerText = data.date;
          document.getElementById('eventTime').innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${data.time}`;
          document.getElementById('deadlineText').innerText = `截止: ${data.deadline}`;

          // 時間邏輯判斷
          checkDeadline(data.deadline);
        })
        .catch(error => console.error('讀取活動資料失敗:', error));
    }

    // 判斷是否超過截止時間
    function checkDeadline(deadlineString) {
      const now = new Date();
      // 將字串轉為 JavaScript 的時間物件
      const deadlineDate = new Date(deadlineString); 
      
      const badge = document.getElementById('statusBadge');
      const btnNormal = document.getElementById('btnNormal');

      if (now > deadlineDate) {
        // 【已截止】的畫面狀態
        badge.innerText = '報名已截止';
        badge.className = 'bg-app-alert text-white px-3 py-1 rounded-full text-xs font-bold shadow-sm shadow-rose-500/30';
        
        // 關閉按鈕功能並改變顏色
        btnNormal.onclick = null;
        btnNormal.innerText = '已截止';
        btnNormal.className = 'w-full mt-4 bg-slate-200 text-slate-400 font-bold py-3.5 rounded-xl cursor-not-allowed transition-all';
      } else {
        // 【開放中】的畫面狀態
        badge.innerText = '報名開放中';
        badge.className = 'bg-white/20 text-white px-3 py-1 rounded-full text-xs font-bold backdrop-blur-sm';
      }
    }

    // 網頁開啟時立刻執行讀取資料
    loadEventData();

    // ---- 以下為原本的底部表單與送出邏輯 (不變) ----
    const bottomSheet = document.getElementById('bottomSheet');
    const backdrop = document.getElementById('backdrop');
    const form = document.getElementById('regForm');
    const submitBtn = document.getElementById('submitBtn');

    function openBottomSheet(typeName) {
      document.getElementById('selectedType').textContent = '已選擇：' + typeName;
      document.getElementById('type').value = typeName;
      backdrop.classList.remove('opacity-0', 'pointer-events-none');
      backdrop.classList.add('opacity-100');
      bottomSheet.classList.remove('translate-y-full');
    }

    function closeBottomSheet() {
      backdrop.classList.remove('opacity-100');
      backdrop.classList.add('opacity-0', 'pointer-events-none');
      bottomSheet.classList.add('translate-y-full');
      setTimeout(() => form.reset(), 300);
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '處理中...';
      submitBtn.disabled = true;

      const data = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        note: document.getElementById('note').value,
        type: document.getElementById('type').value
      };

      fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) })
      .then(res => {
        alert('報名成功！');
        closeBottomSheet();
      })
      .catch(error => alert('發生錯誤，請稍後再試。'))
      .finally(() => {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      });
    });
  </script>
</body>
</html>
