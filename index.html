<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>羽球報名系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdf4',
              100: '#dcfce7',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-brand-50 font-sans text-gray-800 pb-10">

  <div class="bg-brand-600 text-white text-center py-4 text-xl font-bold shadow-md sticky top-0 z-10">
    🏸 羽球報名系統
  </div>

  <div class="max-w-md mx-auto mt-6 px-4 space-y-5">

    <div class="bg-white rounded-2xl shadow-sm p-6 text-center border border-gray-100">
      <h2 class="text-3xl font-bold text-brand-600 tracking-wider">2026 年 4 月 1 日 (週三)</h2>
      <p class="text-gray-500 mt-2 text-lg">20:00 – 22:00</p>
      <div class="mt-3 inline-block bg-brand-100 text-brand-700 px-4 py-1.5 rounded-full text-sm font-bold tracking-wide">
        報名開放中
      </div>
      <p class="text-gray-400 text-sm mt-3">報名截止：4/1 18:00</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
      <div class="flex justify-between items-start">
        <div class="text-lg font-bold text-gray-800">補季繳請假</div>
        <div class="text-red-500 font-bold text-sm">名額已滿</div>
      </div>
      <div class="flex justify-between items-end mt-2">
        <div class="text-3xl font-bold text-brand-600 tracking-tight">NT$ 0</div>
        <div class="text-right text-sm">
          <div class="text-gray-400 font-medium">1 / 1 人</div>
          <div class="text-orange-500 mt-0.5 font-bold">候補 1 人</div>
        </div>
      </div>
      <button class="w-full mt-5 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3.5 px-4 rounded-xl transition duration-200 shadow-sm text-lg">
        加入候補名單
      </button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
      <div class="flex justify-between items-start">
        <div class="text-lg font-bold text-gray-800">一般散打</div>
        <div class="text-brand-600 font-bold text-sm">剩餘 4 位</div>
      </div>
      <div class="flex justify-between items-end mt-2">
        <div class="text-3xl font-bold text-brand-600 tracking-tight">NT$ 0</div>
        <div class="text-right text-sm">
          <div class="text-gray-400 font-medium">2 / 6 人</div>
        </div>
      </div>
      <button onclick="openModal()" class="w-full mt-5 bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 px-4 rounded-xl transition duration-200 shadow-sm text-lg">
        立即報名
      </button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
      <div class="text-lg font-bold text-gray-800 mb-4">查詢我的報名狀態</div>
      <div class="flex gap-2">
        <input type="tel" placeholder="輸入電話號碼" class="flex-1 bg-gray-50 border border-gray-200 text-gray-900 text-base rounded-xl focus:ring-brand-500 focus:border-brand-500 block p-3.5 outline-none transition">
        <button class="bg-gray-700 hover:bg-gray-800 text-white font-bold py-3.5 px-6 rounded-xl transition duration-200 shadow-sm text-lg whitespace-nowrap">
          查詢
        </button>
      </div>
    </div>

  </div>

  <div id="signupModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4">
    <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl relative transform transition-all">
      <h3 class="text-xl font-bold text-gray-800 mb-4 text-center">填寫報名資料</h3>
      
      <form id="regForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
          <input type="text" id="name" required class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none focus:border-brand-500 transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">電話</label>
          <input type="tel" id="phone" required class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none focus:border-brand-500 transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">備註 (選填)</label>
          <input type="text" id="note" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none focus:border-brand-500 transition">
        </div>
        
        <div class="flex gap-3 mt-6">
          <button type="button" onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition">取消</button>
          <button type="submit" id="submitBtn" class="flex-1 bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-xl transition">送出報名</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // 【重要】請把這裡換成你的 Google Apps Script 網頁應用程式 URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz4cf5tRVhNxooTtxzVQAXtJZv4m8MRo58DVcS_s6xXaC6pOki-2TMs1ybYSGT8KqRn/exec'; 
    
    const modal = document.getElementById('signupModal');
    const form = document.getElementById('regForm');
    const submitBtn = document.getElementById('submitBtn');

    // 開啟彈出視窗
    function openModal() {
      modal.classList.remove('hidden');
    }

    // 關閉彈出視窗
    function closeModal() {
      modal.classList.add('hidden');
      form.reset(); // 清空表單
    }

    // 攔截表單送出事件，並呼叫 GAS API
    form.addEventListener('submit', e => {
      e.preventDefault(); // 阻止原本的網頁跳轉
      
      // 改變按鈕狀態，防止重複點擊
      submitBtn.textContent = '處理中...';
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-50');

      // 準備要傳送的資料
      const data = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        note: document.getElementById('note').value
      };

      // 發送請求到 Google Apps Script
      fetch(scriptURL, { 
        method: 'POST', 
        body: JSON.stringify(data)
      })
      .then(res => {
        alert('報名成功！期待在球場見到你！');
        closeModal();
      })
      .catch(error => {
        console.error('錯誤!', error.message);
        alert('報名發生錯誤，請稍後再試。');
      })
      .finally(() => {
        // 恢復按鈕狀態
        submitBtn.textContent = '送出報名';
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-50');
      });
    });
  </script>
</body>
</html>
